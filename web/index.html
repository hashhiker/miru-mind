<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gspänli</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #F5F2EB;
      --surface:    #FDFBF7;
      --border:     #DDD8CE;
      --green-dark: #2A4A12;
      --green-mid:  #4A7A28;
      --green-soft: #7AAD52;
      --green-pale: #E8F0DF;
      --text:       #1A2A0A;
      --text-mid:   #4A5E38;
      --text-muted: #9BA894;
      --red:        #B42318;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #root {
      width: 100%;
      max-width: 700px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      box-shadow: 0 0 80px rgba(42,74,18,0.10);
      position: relative;
      overflow: hidden;
    }

    /* ── Onboarding ── */
    .onboarding {
      position: absolute; inset: 0;
      background: var(--green-dark);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 32px;
      z-index: 100;
      animation: fadeIn 0.4s ease;
    }
    .onboarding-leaf { font-size: 48px; margin-bottom: 24px; }
    .onboarding-name {
      font-family: 'Lora', serif;
      font-size: 36px; color: #E8F0DF;
      font-weight: 500; letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .onboarding-sub {
      font-size: 13px; color: rgba(232,240,223,0.6);
      letter-spacing: 1.2px; text-transform: uppercase;
      margin-bottom: 40px;
    }
    .onboarding-promise {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 24px 28px;
      max-width: 360px; width: 100%;
      margin-bottom: 32px;
    }
    .promise-line {
      display: flex; gap: 12px; align-items: flex-start;
      margin-bottom: 14px; font-size: 14px; color: rgba(232,240,223,0.85);
      line-height: 1.5;
    }
    .promise-line:last-child { margin-bottom: 0; }
    .promise-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .onboarding-btn {
      background: var(--green-soft); color: white; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
      padding: 14px 36px; border-radius: 30px; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .onboarding-btn:hover { background: #8DC462; }
    .onboarding-btn:active { transform: scale(0.97); }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 13px 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .identity { display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 36px; height: 36px; background: var(--green-dark);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 17px; flex-shrink: 0;
    }
    .name { font-family: 'Lora', serif; font-size: 17px; color: var(--text); font-weight: 500; }
    .tagline { font-size: 10px; color: var(--text-muted); letter-spacing: 0.6px; text-transform: uppercase; margin-top: 1px; }

    .header-actions { display: flex; gap: 7px; align-items: center; }
    .btn-pill {
      background: var(--green-pale); border: 1px solid #C2D9A8;
      color: var(--green-dark); font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 500; padding: 6px 13px;
      border-radius: 20px; cursor: pointer; transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-pill:hover { background: #D6E8C4; }
    .btn-pill.ghost { background: transparent; border-color: var(--border); color: var(--text-muted); }
    .btn-pill.ghost:hover { background: var(--green-pale); color: var(--green-dark); }
    .btn-pill:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Check-in Panel ── */
    .checkin-panel {
      background: #F0EDE4; border-bottom: 1px solid var(--border);
      padding: 16px 20px; flex-shrink: 0;
      animation: slideDown 0.2s ease;
    }
    .checkin-title {
      font-size: 11px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.8px; margin-bottom: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .checkin-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .checkin-row:last-child { margin-bottom: 0; }
    .checkin-label { font-size: 12px; color: var(--text-mid); font-weight: 500; min-width: 64px; }
    .mood-slider { flex: 1; accent-color: var(--green-dark); cursor: pointer; }
    .mood-num { font-size: 14px; font-weight: 500; min-width: 28px; color: var(--green-dark); }
    .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
    .btn-toggle {
      background: white; border: 1px solid var(--border);
      color: var(--text-mid); font-family: 'DM Sans', sans-serif;
      font-size: 12px; padding: 5px 12px; border-radius: 16px;
      cursor: pointer; transition: all 0.12s;
    }
    .btn-toggle.active {
      background: var(--green-dark); border-color: var(--green-dark);
      color: white; font-weight: 500;
    }
    .checkin-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
    .btn-save {
      background: var(--green-dark); color: white; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
      padding: 7px 16px; border-radius: 20px; cursor: pointer; transition: background 0.15s;
    }
    .btn-save:hover { background: var(--green-mid); }
    .btn-x { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; line-height: 1; }

    /* ── History Panel ── */
    .history-panel {
      background: #F0EDE4; border-bottom: 1px solid var(--border);
      padding: 14px 20px; flex-shrink: 0; max-height: 200px; overflow-y: auto;
      animation: slideDown 0.2s ease;
    }
    .history-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; display: flex; justify-content: space-between; }
    .history-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-mid); }
    .history-row:last-child { border-bottom: none; }
    .h-mood { font-weight: 500; min-width: 34px; }
    .h-bar { flex: 1; height: 4px; background: #DDD8CE; border-radius: 2px; overflow: hidden; }
    .h-bar-fill { height: 100%; border-radius: 2px; background: var(--green-soft); }
    .h-icons { display: flex; gap: 4px; font-size: 13px; }
    .h-date { color: var(--text-muted); font-size: 11px; min-width: 70px; text-align: right; }

    /* ── Messages ── */
    .messages {
      flex: 1; overflow-y: auto; padding: 20px 20px 10px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: #C8D9B8; border-radius: 3px; }

    .msg { display: flex; gap: 9px; animation: fadeUp 0.22s ease; }
    .msg.user { flex-direction: row-reverse; }

    .msg-av {
      width: 30px; height: 30px; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; font-size: 13px; margin-top: 2px;
    }
    .msg-av.g { background: var(--green-dark); }
    .msg-av.u { background: var(--green-soft); color: white; font-size: 10px; font-weight: 500; }

    .bubble {
      max-width: 74%; padding: 11px 15px; border-radius: 18px;
      font-size: 14px; line-height: 1.65; color: var(--text);
    }
    .msg.g .bubble {
      background: white; border: 1px solid var(--border);
      border-bottom-left-radius: 4px; font-weight: 300;
    }
    .msg.user .bubble {
      background: var(--green-dark); color: #E8F0DF;
      border-bottom-right-radius: 4px;
    }
    .msg-time { font-size: 10px; color: #C0B8AD; margin-top: 3px; padding: 0 3px; }
    .msg.user .msg-time { text-align: right; }

    .typing { display: flex; align-items: center; gap: 5px; padding: 13px 15px; background: white; border: 1px solid var(--border); border-radius: 18px; border-bottom-left-radius: 4px; width: fit-content; }
    .dot { width: 7px; height: 7px; background: var(--green-soft); border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    /* ── Input ── */
    .input-area { background: var(--surface); border-top: 1px solid var(--border); padding: 13px 20px 17px; flex-shrink: 0; }
    .input-row {
      display: flex; gap: 9px; align-items: flex-end;
      background: white; border: 1px solid #C2D9A8; border-radius: 24px;
      padding: 9px 13px 9px 17px; transition: border-color 0.15s;
    }
    .input-row:focus-within { border-color: var(--green-soft); box-shadow: 0 0 0 3px rgba(122,173,82,0.12); }
    textarea {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
      resize: none; line-height: 1.5; max-height: 110px; min-height: 22px; overflow-y: auto;
    }
    textarea::placeholder { color: #C0B8AD; }
    textarea:disabled { opacity: 0.5; }
    .send-btn {
      background: var(--green-dark); border: none; color: white;
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s, transform 0.1s;
    }
    .send-btn:hover { background: var(--green-mid); }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { background: #C8D9B8; cursor: not-allowed; transform: none; }

    .disclaimer { text-align: center; font-size: 10px; color: #C0B8AD; margin-top: 7px; line-height: 1.5; }
    .disclaimer a { color: var(--text-muted); text-decoration: none; }
    .disclaimer a:hover { text-decoration: underline; }

    .error-banner { background: #FEF3F2; border: 1px solid #FECDCA; color: var(--red); font-size: 12px; padding: 8px 16px; text-align: center; flex-shrink: 0; }

    /* ── Animations ── */
    /* ── Auto-Save Toast ── */
    .toast {
      position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--green-dark); color: #E8F0DF;
      font-size: 12px; font-weight: 500; padding: 8px 18px;
      border-radius: 20px; white-space: nowrap; pointer-events: none;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
      z-index: 50;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(6px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(6px); } }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;
    const API = "";
    const fmt = d => d.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
    const fmtDate = s => new Date(s).toLocaleDateString("de-CH", { day: "2-digit", month: "2-digit" });

    const SLEEP_LABELS = { gut: "🌙 Gut", mittel: "🌙 Mittel", schlecht: "🌙 Schlecht" };
    const MOOD_COLOR = v => v >= 7 ? "#4A7A28" : v >= 4 ? "#B8860B" : "#B42318";

    function App() {
      const [onboarded, setOnboarded]   = useState(() => !!localStorage.getItem("gspaenli_ob"));
      const [messages, setMessages]     = useState([]);
      const [input, setInput]           = useState("");
      const [loading, setLoading]       = useState(false);
      const [finalizing, setFinalizing] = useState(false);
      const [showCheckin, setShowCheckin] = useState(false);
      const [showHistory, setShowHistory] = useState(false);
      const [history, setHistory]       = useState({});
      const [checkinLog, setCheckinLog] = useState([]);
      const [error, setError]           = useState("");
      const [done, setDone]             = useState(false);
      const [savedToast, setSavedToast] = useState(false);
      // Check-in state
      const [ciMood, setCiMood]         = useState(6);
      const [ciSleep, setCiSleep]       = useState("mittel");
      const [ciExercise, setCiExercise] = useState(false);
      const endRef        = useRef(null);
      const taRef         = useRef(null);
      const greeted       = useRef(false);
      const messagesRef   = useRef([]);    // immer aktuell, auch in Event-Listenern
      const doneRef       = useRef(false);
      const inactiveTimer = useRef(null);
      const INACTIVITY_MS = 10 * 60 * 1000; // 10 Minuten

      useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);

      // messagesRef synchron halten
      useEffect(() => { messagesRef.current = messages; }, [messages]);

      // History laden
      useEffect(() => {
        fetch(`${API}/api/history`)
          .then(r => r.json())
          .then(data => {
            setHistory(data);
            setCheckinLog((data.checkins || []).slice(-30));
          })
          .catch(() => {});
      }, []);

      const callChat = useCallback(async (msgs) => {
        const res = await fetch(`${API}/api/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: msgs, history }),
        });
        if (!res.ok) throw new Error(`Server-Fehler ${res.status}`);
        return (await res.json()).response;
      }, [history]);

      // Begrüssung
      useEffect(() => {
        if (!onboarded || greeted.current) return;
        greeted.current = true;
        setLoading(true);
        callChat([{ role: "user", content: "Hallo." }])
          .then(text => setMessages([{ role: "assistant", text, time: new Date() }]))
          .catch(() => {
            setError("Server nicht erreichbar. Läuft server.py auf Port 8000?");
            setMessages([{ role: "assistant", text: "Hoi. Schön dass du da bist – wie geht's dir gerade?", time: new Date() }]);
          })
          .finally(() => setLoading(false));
      }, [onboarded, callChat]);

      // ── Auto-Save Logik ──────────────────────────────────────────────────────
      const silentFinalize = useCallback(async () => {
        const msgs = messagesRef.current;
        // Nur speichern wenn es echte User-Nachrichten gibt und noch nicht gespeichert
        const hasUserMsgs = msgs.some(m => m.role === "user");
        if (!hasUserMsgs || doneRef.current) return;
        doneRef.current = true;
        setDone(true);
        try {
          await fetch(`${API}/api/finalize`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_messages: msgs.map(m => ({ role: m.role, content: m.text })) }),
          });
          setSavedToast(true);
          setTimeout(() => setSavedToast(false), 3000);
        } catch {}
      }, []);

      // Tab wird geschlossen oder gewechselt → sofort speichern (via sendBeacon, kein async nötig)
      useEffect(() => {
        const handleVisibility = () => {
          if (document.visibilityState === "hidden") silentFinalize();
        };
        const handleUnload = () => {
          const msgs = messagesRef.current;
          if (!msgs.some(m => m.role === "user") || doneRef.current) return;
          // sendBeacon funktioniert zuverlässig beim Tab-Schliessen
          const blob = new Blob(
            [JSON.stringify({ session_messages: msgs.map(m => ({ role: m.role, content: m.text })) })],
            { type: "application/json" }
          );
          navigator.sendBeacon(`${API}/api/finalize`, blob);
        };
        document.addEventListener("visibilitychange", handleVisibility);
        window.addEventListener("pagehide", handleUnload);
        return () => {
          document.removeEventListener("visibilitychange", handleVisibility);
          window.removeEventListener("pagehide", handleUnload);
        };
      }, [silentFinalize]);

      // Inaktivitäts-Timer: nach 10 Min ohne neue Nachricht automatisch speichern
      const resetInactivityTimer = useCallback(() => {
        if (inactiveTimer.current) clearTimeout(inactiveTimer.current);
        inactiveTimer.current = setTimeout(() => {
          silentFinalize();
        }, INACTIVITY_MS);
      }, [silentFinalize]);

      // ─────────────────────────────────────────────────────────────────────────

      const send = async () => {
        const text = input.trim();
        if (!text || loading || done) return;
        setInput("");
        if (taRef.current) taRef.current.style.height = "22px";
        setError("");
        const userMsg = { role: "user", text, time: new Date() };
        const updated = [...messages, userMsg];
        setMessages(updated);
        setLoading(true);
        try {
          const reply = await callChat(updated.map(m => ({ role: m.role, content: m.text })));
          setMessages(prev => [...prev, { role: "assistant", text: reply, time: new Date() }]);
          resetInactivityTimer(); // Timer nach jeder Antwort neu starten
        } catch (e) {
          setError(e.message);
        } finally { setLoading(false); }
      };

      const onKey = e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } };
      const onInput = e => {
        setInput(e.target.value);
        e.target.style.height = "22px";
        e.target.style.height = Math.min(e.target.scrollHeight, 110) + "px";
      };

      const finalize = async () => {
        if (finalizing || done || messages.length === 0) return;
        setFinalizing(true);
        try {
          await fetch(`${API}/api/finalize`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_messages: messages.map(m => ({ role: m.role, content: m.text })) }),
          });
          doneRef.current = true;
          setDone(true);
          setMessages(prev => [...prev, { role: "assistant", text: "Gespräch gespeichert 🌿 Beim nächsten Mal erinnere ich mich. Bis bald.", time: new Date() }]);
        } catch { setError("Konnte nicht gespeichert werden."); }
        finally { setFinalizing(false); }
      };

      const saveCheckin = async () => {
        const entry = { mood: ciMood, sleep: ciSleep, exercise: ciExercise, date: new Date().toISOString(), source: "manual" };
        setCheckinLog(prev => [...prev, entry]);
        setShowCheckin(false); setShowHistory(true);
        try {
          await fetch(`${API}/api/checkin`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mood: ciMood, sleep: ciSleep, exercise: ciExercise }),
          });
        } catch {}
      };

      const handleOnboard = () => {
        localStorage.setItem("gspaenli_ob", "1");
        setOnboarded(true);
      };

      return (
        <>
          {/* Onboarding */}
          {!onboarded && (
            <div className="onboarding">
              <div className="onboarding-leaf">🌿</div>
              <div className="onboarding-name">Gspänli</div>
              <div className="onboarding-sub">Dein privater Begleiter</div>
              <div className="onboarding-promise">
                <div className="promise-line">
                  <span className="promise-icon">🔒</span>
                  <span>Alles bleibt auf deinem Gerät. Kein Server, kein Unternehmen, niemand sonst liest mit – nie.</span>
                </div>
                <div className="promise-line">
                  <span className="promise-icon">🌿</span>
                  <span>Gspänli ist dein Raum für die Momente wo du einfach reden musst – ohne Bewertung, ohne Ratschläge.</span>
                </div>
                <div className="promise-line">
                  <span className="promise-icon">🧠</span>
                  <span>Gspänli erinnert sich und erkennt mit der Zeit was dir gut tut – und was nicht.</span>
                </div>
              </div>
              <button className="onboarding-btn" onClick={handleOnboard}>Los gehts</button>
            </div>
          )}

          {/* Header */}
          <header className="header">
            <div className="identity">
              <div className="avatar">🌿</div>
              <div>
                <div className="name">Gspänli</div>
                <div className="tagline">Dein privater Begleiter</div>
              </div>
            </div>
            <div className="header-actions">
              {checkinLog.length > 0 && (
                <button className="btn-pill ghost" onClick={() => { setShowHistory(h => !h); setShowCheckin(false); }}>
                  {showHistory ? "Schliessen" : `Verlauf (${checkinLog.length})`}
                </button>
              )}
              <button className="btn-pill ghost" onClick={() => { setShowCheckin(c => !c); setShowHistory(false); }}>
                ◯ Check-in
              </button>

            </div>
          </header>

          {error && <div className="error-banner">⚠ {error}</div>}

          {/* Check-in Panel */}
          {showCheckin && (
            <div className="checkin-panel">
              <div className="checkin-title">
                <span>Wie war dein Tag?</span>
                <button className="btn-x" onClick={() => setShowCheckin(false)}>×</button>
              </div>
              <div className="checkin-row">
                <span className="checkin-label">Stimmung</span>
                <input type="range" className="mood-slider" min="1" max="10" step="1"
                  value={ciMood} onChange={e => setCiMood(Number(e.target.value))} />
                <span className="mood-num" style={{ color: MOOD_COLOR(ciMood) }}>{ciMood}</span>
              </div>
              <div className="checkin-row">
                <span className="checkin-label">Schlaf</span>
                <div className="btn-group">
                  {["gut","mittel","schlecht"].map(s => (
                    <button key={s} className={`btn-toggle ${ciSleep === s ? "active" : ""}`}
                      onClick={() => setCiSleep(s)}>
                      {SLEEP_LABELS[s]}
                    </button>
                  ))}
                </div>
              </div>
              <div className="checkin-row">
                <span className="checkin-label">Bewegung</span>
                <div className="btn-group">
                  <button className={`btn-toggle ${ciExercise ? "active" : ""}`} onClick={() => setCiExercise(true)}>🏃 Ja</button>
                  <button className={`btn-toggle ${!ciExercise ? "active" : ""}`} onClick={() => setCiExercise(false)}>Nein</button>
                </div>
              </div>
              <div className="checkin-actions">
                <button className="btn-save" onClick={saveCheckin}>Speichern</button>
              </div>
            </div>
          )}

          {/* History Panel */}
          {showHistory && checkinLog.length > 0 && (
            <div className="history-panel">
              <div className="history-title">
                <span>Check-in Verlauf</span>
                <button className="btn-x" onClick={() => setShowHistory(false)}>×</button>
              </div>
              {[...checkinLog].reverse().map((c, i) => (
                <div className="history-row" key={i}>
                  <span className="h-mood" style={{ color: MOOD_COLOR(c.mood) }}>{c.mood}/10</span>
                  <div className="h-bar"><div className="h-bar-fill" style={{ width: `${c.mood * 10}%` }} /></div>
                  <div className="h-icons">
                    {c.sleep === "gut" && <span title="Gut geschlafen">🌙✓</span>}
                    {c.sleep === "schlecht" && <span title="Schlecht geschlafen">🌙✗</span>}
                    {c.exercise && <span title="Sport">🏃</span>}
                    {c.source === "conversation" && <span title="Aus Gespräch">💬</span>}
                  </div>
                  <span className="h-date">{fmtDate(c.date)}</span>
                </div>
              ))}
            </div>
          )}

          {/* Messages */}
          <div className="messages">
            {messages.map((m, i) => (
              <div key={i} className={`msg ${m.role === "user" ? "user" : "g"}`}>
                <div className={`msg-av ${m.role === "user" ? "u" : "g"}`}>
                  {m.role === "user" ? "Du" : "🌿"}
                </div>
                <div>
                  <div className="bubble">{m.text}</div>
                  <div className="msg-time">{fmt(m.time)}</div>
                </div>
              </div>
            ))}
            {(loading || finalizing) && (
              <div className="msg g">
                <div className="msg-av g">🌿</div>
                <div className="typing"><div className="dot"/><div className="dot"/><div className="dot"/></div>
              </div>
            )}
            <div ref={endRef} />
          </div>

          {/* Auto-Save Toast */}
          {savedToast && <div className="toast">🌿 Automatisch gespeichert</div>}

          {/* Input */}
          <div className="input-area">
            <div className="input-row" style={{ opacity: done ? 0.5 : 1 }}>
              <textarea ref={taRef}
                placeholder={done ? "Gespräch beendet." : "Schreib was dich bewegt…"}
                value={input} onChange={onInput} onKeyDown={onKey} rows={1}
                style={{ height: "22px" }} disabled={done} />
              <button className="send-btn" onClick={send} disabled={!input.trim() || loading || done}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </button>
            </div>
            <div className="disclaimer">
              Gspänli ersetzt keine professionelle Beratung. Krise?&nbsp;
              <a href="tel:143">143</a> (CH) · <a href="tel:08001110111">0800 111 0 111</a> (DE/AT) – kostenlos, 24/7
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
